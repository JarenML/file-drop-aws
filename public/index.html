<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Drop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --border: #2a2a2a;
            --border-hover: #444;
            --accent: #e8ff47;
            --accent-dim: rgba(232, 255, 71, 0.12);
            --text: #f0f0f0;
            --text-muted: #666;
            --text-dim: #999;
            --danger: #ff4d4d;
            --success: #4dff91;
            --mono: "Space Mono", monospace;
            --display: "Syne", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(232, 255, 71, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 255, 71, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* Header */
        header {
            margin-bottom: 56px;
        }

        .tag {
            display: inline-block;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 10px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        h1 {
            font-family: var(--display);
            font-size: clamp(42px, 8vw, 72px);
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 16px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            line-height: 1.6;
        }

        /* Upload zone */
        .upload-zone {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition:
                border-color 0.2s,
                background 0.2s;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .upload-zone::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--accent-dim);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--accent);
        }

        .upload-zone:hover::before {
            opacity: 1;
        }

        .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--surface2);
        }

        .upload-zone.dragover::before {
            opacity: 1;
        }

        .upload-zone input {
            display: none;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            border: 2px solid var(--border-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .upload-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--accent);
        }

        .upload-text {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        /* Limit bar */
        .limit-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-top: none;
            margin-bottom: 40px;
        }

        .limit-label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .limit-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
        }

        .limit-count.full {
            color: var(--danger);
        }

        .limit-track {
            flex: 1;
            height: 2px;
            background: var(--border);
            margin: 0 16px;
            position: relative;
        }

        .limit-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .limit-fill.full {
            background: var(--danger);
        }

        /* Upload button (standalone) */
        .upload-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition:
                background 0.15s,
                transform 0.1s;
            display: none;
            margin-bottom: 40px;
        }

        .upload-btn:hover {
            background: #d4eb30;
        }

        .upload-btn:active {
            transform: scale(0.99);
        }

        .upload-btn.visible {
            display: block;
        }

        .upload-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .upload-btn .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Files section */
        .files-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .files-title {
            font-family: var(--display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .files-count {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* File item */
        .file-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-ext {
            width: 40px;
            height: 40px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .file-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .file-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-download {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 6px 14px;
            transition:
                background 0.15s,
                color 0.15s;
        }

        .btn-download:hover {
            background: var(--accent);
            color: #000;
        }

        /* Empty state */
        .empty {
            padding: 48px 0;
            text-align: center;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .empty-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-muted);
        }

        .empty p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 12px 20px;
            font-size: 12px;
            font-family: var(--mono);
            letter-spacing: 0.05em;
            border: 1px solid;
            z-index: 100;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #0a1a0f;
            border-color: var(--success);
            color: var(--success);
        }

        .toast.error {
            background: #1a0a0a;
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Selected file preview */
        .selected-file {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-bottom: none;
            font-size: 12px;
            color: var(--text-dim);
        }

        .selected-file.visible {
            display: flex;
        }

        .selected-file span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 2px 4px;
        }

        .btn-clear:hover {
            color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="tag">v1.0 · AWS S3</div>
            <h1>File<br /><span>Drop</span></h1>
            <p class="subtitle">
                Almacenamiento personal en la nube.<br />Máximo 10 archivos.
            </p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" />
            <div class="upload-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 16 12 12 8 16" />
                    <line x1="12" y1="12" x2="12" y2="21" />
                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
            </div>
            <div class="upload-text">Arrastra o haz clic para seleccionar</div>
            <div class="upload-hint" id="uploadHint">
                PDF, imágenes, documentos — cualquier formato
            </div>
        </div>

        <div class="selected-file" id="selectedFile">
            <span id="selectedName">—</span>
            <button class="btn-clear" onclick="clearSelection()">✕</button>
        </div>

        <div class="limit-bar">
            <span class="limit-label">Almacenamiento</span>
            <div class="limit-track">
                <div class="limit-fill" id="limitFill" style="width: 0%"></div>
            </div>
            <span class="limit-count" id="limitCount">0 / 10</span>
        </div>

        <button class="upload-btn" id="uploadBtn" onclick="uploadFile()">
            Subir archivo
        </button>

        <div class="files-header">
            <span class="files-title">Archivos</span>
            <span class="files-count" id="filesCount">—</span>
        </div>

        <div id="fileList">
            <div class="empty">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                        <polyline points="13 2 13 9 20 9" />
                    </svg>
                </div>
                <p>No hay archivos aún.</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = "http://file-drop-alb-240168612.us-east-1.elb.amazonaws.com";
        const MAX_FILES = 10;
        let currentCount = 0;

        const fileInput = document.getElementById("fileInput");
        const uploadZone = document.getElementById("uploadZone");
        const uploadBtn = document.getElementById("uploadBtn");
        const selectedFile = document.getElementById("selectedFile");
        const selectedName = document.getElementById("selectedName");

        // Click zone
        uploadZone.addEventListener("click", () => fileInput.click());

        // Drag and drop
        uploadZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadZone.classList.add("dragover");
        });
        uploadZone.addEventListener("dragleave", () =>
            uploadZone.classList.remove("dragover"),
        );
        uploadZone.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadZone.classList.remove("dragover");
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                onFileSelected();
            }
        });

        fileInput.addEventListener("change", onFileSelected);

        function onFileSelected() {
            if (!fileInput.files.length) return;
            const file = fileInput.files[0];

            // Límite de 50 MB
            const MAX_SIZE = 50 * 1024 * 1024;
            if (file.size > MAX_SIZE) {
                showToast("El archivo supera el límite de 50 MB", "error");
                fileInput.value = "";
                return;
            }

            selectedName.textContent = file.name;
            selectedFile.classList.add("visible");
            uploadBtn.classList.add("visible");
            if (currentCount >= MAX_FILES) {
                uploadBtn.disabled = true;
                uploadBtn.textContent = "Límite alcanzado (10/10)";
            } else {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = "Subir archivo";
            }
        }

        function clearSelection() {
            fileInput.value = "";
            selectedFile.classList.remove("visible");
            uploadBtn.classList.remove("visible");
        }

        function getExt(name) {
            const parts = name.split(".");
            return parts.length > 1 ? parts.pop().substring(0, 4) : "FILE";
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + " B";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString("es-PE", {
                day: "2-digit",
                month: "short",
                year: "numeric",
            });
        }

        function showToast(msg, type = "success") {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function updateLimitBar(count) {
            currentCount = count;
            const pct = (count / MAX_FILES) * 100;
            const fill = document.getElementById("limitFill");
            const label = document.getElementById("limitCount");
            fill.style.width = pct + "%";
            label.textContent = `${count} / ${MAX_FILES}`;
            if (count >= MAX_FILES) {
                fill.classList.add("full");
                label.classList.add("full");
            } else {
                fill.classList.remove("full");
                label.classList.remove("full");
            }
            document.getElementById(
                "filesCount",
                `${count} archivo${count !== 1 ? "s" : ""}`,
            );
        }

        async function loadFiles() {
            try {
                const res = await fetch(`${API}/api/files`);
                const files = await res.json();
                const list = document.getElementById("fileList");
                const count = document.getElementById("filesCount");

                updateLimitBar(files.length);
                count.textContent = `${files.length} archivo${files.length !== 1 ? "s" : ""}`;

                if (!files.length) {
                    list.innerHTML = `
            <div class="empty">
              <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                  <polyline points="13 2 13 9 20 9"/>
                </svg>
              </div>
              <p>No hay archivos aún.</p>
            </div>`;
                    return;
                }

                list.innerHTML = files
                    .map(
                        (f) => `
          <div class="file-item">
            <div class="file-ext">${getExt(f.name)}</div>
            <div class="file-info">
              <div class="file-name">${f.name}</div>
              <div class="file-meta">${formatSize(f.size)} · ${formatDate(f.date)}</div>
            </div>
            <div class="file-actions">
              <a class="btn-download" href="${API}/api/files/download/${f.name}">Descargar</a>
            </div>
          </div>`,
                    )
                    .join("");
            } catch (e) {
                showToast("Error al cargar archivos", "error");
            }
        }

        async function uploadFile() {
            if (!fileInput.files.length) return;
            if (currentCount >= MAX_FILES) {
                showToast("Límite de 10 archivos alcanzado", "error");
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span>Subiendo...';

            try {
                const formData = new FormData();
                formData.append("file", fileInput.files[0]);
                const res = await fetch(`${API}/api/files/upload`, {
                    method: "POST",
                    body: formData,
                });
                if (!res.ok) throw new Error();
                showToast("Archivo subido correctamente", "success");
                clearSelection();
                loadFiles();
            } catch {
                showToast("Error al subir el archivo", "error");
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = "Subir archivo";
            }
        }

        loadFiles();
    </script>
</body>

</html>
